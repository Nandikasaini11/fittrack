name: fittrack
description: "A new Flutter workout logger app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0-0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hive_flutter: ^1.1.0
  dio: ^5.7.0
  fl_chart: ^1.2.0
  flutter_local_notifications: ^18.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  intl: ^0.19.0
  hive: ^2.2.3
  timezone: ^0.9.4
  flutter_animate: ^4.5.2
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
